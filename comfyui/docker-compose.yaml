services:
  server:
    image: jianshao/comfyui-rt:${image_tag:-latest}
    hostname: comfyui-server
    pull_policy: always
    restart: unless-stopped
    init: true
    command:
      - python
      - main.py
      - --enable-manager
      - --listen
      - 0.0.0.0
    environment:
      - https_proxy=${https_proxy:-}
      - HF_XET_HIGH_PERFORMANCE=${HF_XET_HIGH_PERFORMANCE:-1}
    volumes:
      - ~/.ssh:/home/devel/.ssh
      - ${model_cache_path:-~/.cache}:/home/devel/.cache
      - ${comfyui_root}:/home/devel/ComfyUI
      - ${workflow_templates}:/home/devel/workflow_templates
      - ./install-models.sh:/usr/local/bin/install-models.sh
    ports:
      - 8188:8188
