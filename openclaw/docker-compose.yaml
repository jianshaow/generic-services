services:
  gateway:
    image: jianshao/sandbox-base:${image_tag:-latest}
    hostname: openclaw-gateway
    pull_policy: always
    restart: unless-stopped
    working_dir: /home/devel/workspace
    command: ["openclaw", "gateway", "--bind", "lan"]
    init: true
    volumes:
      - ${workspace:-~/workspace}:/home/devel/workspace
      - ~/.nvm:/home/devel/.nvm
      - ~/.local:/home/devel/.local
      - ${openclaw_home:-~/.openclaw}:/home/devel/.openclaw
    environment:
      - https_proxy=${https_proxy:-}
    ports:
      - 18789:18789
