services:
  server:
    image: jianshao/ollama:${ollama_image_tag}
    hostname: ollama-server
    pull_policy: always
    restart: unless-stopped
    volumes:
      - ${model_cache_path:-~/.ollama}:/home/ubuntu/.ollama
      - ~/.local:/home/ubuntu/.local
      - ~/.config:/home/ubuntu/.config
      - ~/.cache:/home/ubuntu/.cache
      - ~/.nvm:/home/ubuntu/.nvm
      - ~/.codex:/home/ubuntu/.codex
      - ~/.claude:/home/ubuntu/.claude
      - ~/.opencode:/home/ubuntu/.opencode
    environment:
      - https_proxy=${https_proxy:-}
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-1}
    ports:
      - 11434:11434
